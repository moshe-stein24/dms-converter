name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            artifact_name: dms_converter
            artifact_path: build/linux/x64/release/bundle/dms_converter
            zip_name: dms-converter-linux-x64.zip

          - platform: windows
            runner: windows-latest
            artifact_name: dms_converter.exe
            artifact_path: build/windows/runner/Release/dms_converter.exe
            zip_name: dms-converter-windows-x64.zip

          - platform: macos
            runner: macos-latest
            artifact_name: dms_converter.app
            artifact_path: build/macos/Build/Products/Release/dms_converter.app
            zip_name: dms-converter-macos.zip

          - platform: android
            runner: ubuntu-latest
            artifact_name: app-release.apk
            artifact_path: build/app/outputs/flutter-apk/app-release.apk
            zip_name: dms-converter-android.apk

    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build ${{ matrix.platform }}
        run: |
          if [ "${{ matrix.platform }}" = "linux" ]; then
            flutter build linux --release
          elif [ "${{ matrix.platform }}" = "windows" ]; then
            flutter build windows --release
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            flutter build macos --release
          elif [ "${{ matrix.platform }}" = "android" ]; then
            flutter build apk --release
          fi
        shell: bash

      - name: Compress artifact (Linux/macOS)
        if: matrix.platform != 'windows' && matrix.platform != 'android'
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            cd build/macos/Build/Products/Release/
            zip -r ${{ matrix.zip_name }} dms_converter.app
            mv ${{ matrix.zip_name }} ../../../../..
          else
            cd build/linux/x64/release/
            zip -r ${{ matrix.zip_name }} bundle
            mv ${{ matrix.zip_name }} ../../../..
          fi
        shell: bash

      - name: Compress artifact (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd build/windows/runner/Release
          powershell -Command "Compress-Archive -Path dms_converter.exe -DestinationPath dms-converter-windows-x64.zip"
          Move-Item dms-converter-windows-x64.zip ../../../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.platform }}-build
          path: |
            build/linux/x64/release/bundle/
            build/windows/runner/Release/dms_converter.exe
            build/macos/Build/Products/Release/dms_converter.app
            build/app/outputs/flutter-apk/app-release.apk
            dms-converter-*.zip
            dms-converter-*.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.apk
            artifacts/**/dms_converter
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
